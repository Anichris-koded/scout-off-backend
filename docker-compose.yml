version: "3.8"

services:
  backend:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      # Points the search cache (src/services/cache.ts) at the redis service
      # below instead of the process-local in-memory fallback. Unset this
      # (or drop the redis service) to run against the in-memory cache.
      REDIS_URL: "redis://redis:6379"
    volumes:
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  # Optional: only needed so `backend` can use the Redis-backed cache store
  # locally. The backend falls back to an in-memory cache automatically if
  # REDIS_URL is unset, so this service can be removed without breaking
  # anything.
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  backend-data:
